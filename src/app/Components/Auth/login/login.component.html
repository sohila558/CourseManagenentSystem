<section class="vh-100">
  <div class="container-fluid h-custom">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-md-9 col-lg-6 col-xl-5">
        <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.webp"
          class="img-fluid" alt="Sample image">
      </div>
      <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
        
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          
          <div class="d-flex flex-row align-items-center justify-content-center justify-content-lg-start">
            <p class="lead fw-normal mb-0 me-3">Course Management System</p>
          </div>

          <div *ngIf="error$ | async as error" class="alert alert-danger mt-3 py-2 small">
            {{ error }}
          </div>

          <div class="divider d-flex align-items-center my-4">
            <p class="text-center fw-bold mx-3 mb-0">Login</p>
          </div>

          <div class="form-outline mb-4">
            <input type="email" formControlName="email" id="email" 
              class="form-control form-control-lg"
              placeholder="Enter a valid email address" 
              [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" />
            <label class="form-label" for="email">Email address</label>
            <div class="invalid-feedback">Please enter a valid email address!</div>
          </div>

          <div class="form-outline mb-3">
            <input type="password" formControlName="password" id="password" 
              class="form-control form-control-lg"
              placeholder="Enter password"
              [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" />
            <label class="form-label" for="password">Password</label>
            <div class="invalid-feedback">The password must be at least 6 characters long!</div>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <div class="form-check mb-0">
              <input class="form-check-input me-2" type="checkbox" id="remember" />
              <label class="form-check-label" for="remember">Remember me</label>
            </div>
          </div>

          <div class="text-center text-lg-start mt-4 pt-2">
            <button type="submit" 
              class="btn btn-primary btn-lg"
              style="padding-left: 2.5rem; padding-right: 2.5rem;"
              [disabled]="loginForm.invalid || (loading$ | async)">
              
              <span *ngIf="loading$ | async" class="spinner-border spinner-border-sm me-2"></span>
              {{ (loading$ | async) ? 'Logging in...' : 'Login' }}
            </button>
            
            <p class="small fw-bold mt-2 pt-1 mb-0">Contact Admin to create an account</p>
          </div>

        </form>
      </div>
    </div>
  </div>

  <div class="d-flex flex-column flex-md-row text-center text-md-start justify-content-between py-4 px-4 px-xl-5 bg-primary mt-auto">
    <div class="text-white mb-3 mb-md-0">
      Copyright © 2026. All rights reserved.
    </div>
  </div>
</section>
