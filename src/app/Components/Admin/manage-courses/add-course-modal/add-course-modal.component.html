<div class="modal fade" id="addCourseModal" tabindex="-1" aria-labelledby="addCourseModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">{{ courseToEdit ? 'Edit Course' : 'Add New Course' }}</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
        <div class="modal-body p-4">
          <div class="mb-3">
            <label class="form-label fw-bold">Course Title</label>
            <input type="text" class="form-control" formControlName="title" placeholder="e.g. Angular Advanced">
            <div *ngIf="courseForm.get('title')?.touched && courseForm.get('title')?.invalid"
              class="text-danger small mt-1">
              Title is required (min 3 chars).
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Instructor Name</label>
            <select class="form-select" formControlName="instructorName">
              <option value="" disabled selected>Choose an instructor</option>
              <option *ngFor="let inst of (instructors$ | async)" [value]="inst.name">
                {{ inst.name }}
              </option>
            </select>
            <div *ngIf="courseForm.get('instructorName')?.touched && courseForm.get('instructorName')?.invalid"
              class="text-danger small mt-1">
              Please select an instructor.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Description</label>
            <textarea class="form-control" formControlName="description" rows="3"
              placeholder="Briefly describe the course"></textarea>
          </div>
        </div>
        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-success px-4" [disabled]="courseForm.invalid">Save Course</button>
        </div>
      </form>
    </div>
  </div>
</div>
