<div class="container-fluid py-5 px-lg-5 bg-dashboard-gray min-vh-100">

  <div class="row g-5">
    @for (course of courses; track course.id) {
    <div class="col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm course-card">

        <div class="img-wrapper">
          <img [src]="course.image || 'assets/images/default-course.jpg'" class="card-img-top" style="object-fit: cover; height: 200px;" alt="Course image">
          <div class="img-overlay"></div>
          <span class="badge category-badge position-absolute top-0 end-0 m-4 rounded-pill shadow-sm">
            {{ course.category || 'Development' }}
          </span>
        </div>

        <div class="card-body d-flex flex-column p-4">
          <h5 class="card-title fw-bold text-dark mb-3 h5">{{ course.title }}</h5>
          <p class="card-text text-muted small mb-3 flex-grow-1">
            <i class="fas fa-user-tie me-2 text-primary"></i>
            <span class="fw-medium">Instructor:</span> {{ course.instructorName }}
          </p>

          <div class="d-flex justify-content-between align-items-center mt-auto pt-4 border-top">
            <button class="btn btn-modern-primary text-white fw-bold px-4 shadow-sm" (click)="onViewLessons(course.id)">
              <i class="fas fa-book-open me-2"></i>Lessons
            </button>
            <button class="btn btn-outline-warning btn-sm rounded-pill shadow-sm" (click)="onEdit(course)"
              data-bs-toggle="modal" data-bs-target="#addCourseModal" title="Edit Course">
              <i class="fas fa-edit p-2"></i>
            </button>
            <button class="btn btn-modern-danger btn-sm rounded-pill shadow-sm" (click)="onDelete(course.id)"
              title="Delete Course">
              <i class="fas fa-trash-alt p-2"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    }
  </div>

</div>
