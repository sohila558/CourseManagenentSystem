<div class="table-responsive bg-white shadow-sm rounded-3">
    <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
            <tr>
                <th class="px-4 py-3">Course Title</th>
                <th class="py-3">Instrucor</th>
                <th class="py-3 text-center">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let course of courses">
                <td class="px-4">
                    <div class="fw-bold text-dark">{{ course.title }}</div>
                </td>
                <td>{{ course.instructorName }}</td>
                <td class="text-center">
                    <div class="d-flex justify-content-center gap-2">
                        <button class="btn btn-sm btn-outline-primary" (click)="onViewLessons(course.id)">
                            <i class="fas fa-book-open me-1"></i> Lessons
                        </button>
                        <button class="btn btn-sm btn-outline-danger" (click)="onDelete(course.id)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>
            <tr *ngIf="courses?.length === 0">
                <td colspan="3" class="text-center py-5 text-muted">
                    No courses found. Add your first course now!
                </td>
            </tr>
        </tbody>
    </table>
</div>
