<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-4 p-4 bg-white shadow-sm rounded-3 border-start border-success border-5">
    <div>
      <h2 class="fw-bold text-dark mb-1">
        <i class="fas fa-graduation-cap me-2 text-success"></i>Manage Courses
      </h2>
      <p class="text-muted mb-0">View, add, and organize your educational programs.</p>
    </div>
    
    <button class="btn btn-success px-4 py-2 shadow-sm d-flex align-items-center" 
            data-bs-toggle="modal" 
            data-bs-target="#addCourseModal">
      <i class="fas fa-plus-circle me-2"></i> Create New Course
    </button>
  </div>

<app-course-list-table 
    [courses]="courses$ | async" 
    (delete)="onDelete($event)"
    (viewLessons)="viewLessons($event)">
  </app-course-list-table>
<app-add-course-modal (courseAdded)="onCourseAdded($event)"></app-add-course-modal>
