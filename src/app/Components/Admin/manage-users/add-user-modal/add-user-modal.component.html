<div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">
                    <i class="fas fa-user-plus me-2"></i>
                    Add New User
                </h5>
                <button type="button" class="btn btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Full Name
                        </label>
                        <input type="text" formControlName="name" class="form-control"
                            [class.is-invalid]="userForm.get('name')?.invalid && userForm.get('name')?.touched"
                            placeholder="Enter full name">
                        <div class="invalid-feedback">Name must be at least 3 characters.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email Address</label>
                        <input type="email" formControlName="email" class="form-control"
                            [class.is-invalid]="userForm.get('email')?.invalid && userForm.get('email')?.touched"
                            placeholder="name@example.com">
                        <div class="invalid-feedback">Please enter a valid email.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">User Role</label>
                        <select formControlName="role" class="form-select">
                            <option value="Student">Student</option>
                            <option value="Instructor">Instructor</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

                    <button type="submit" class="btn btn-primary px-4" [disabled]="userForm.invalid"
                        data-bs-dismiss="modal">
                        {{ userToEdit ? 'Save Changes' : 'Create User' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
