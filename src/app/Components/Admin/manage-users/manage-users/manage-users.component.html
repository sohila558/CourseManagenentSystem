<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold mb-0">Manage Users</h2>
    
    <div class="search-box w-50">
      <div class="input-group shadow-sm">
        <span class="input-group-text bg-white border-end-0">
          <i class="fas fa-search text-muted"></i>
        </span>
        <input 
          type="text" 
          class="form-control border-start-0 ps-0" 
          placeholder="Search by name or email..."
          (input)="onSearch($event)">
      </div>
    </div>

    <button class="btn btn-primary px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#addUserModal" (click)="clearSelectedUser()">
      <i class="fas fa-user-plus me-2"></i>Add New User
    </button>
  </div>
  
  @if (data$ | async; as data) {
    <app-user-list-table 
      [users]="data.users" 
      [allEnrollments]="data.enrollments"
      (delete)="handleDelete($event)"
      (edit)="handleEdit($event)">
    </app-user-list-table>
  } @else {
    <div class="text-center py-5">
       <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
       </div>
    </div>
  }
  
  <app-add-user-modal [userToEdit]="selectedUser"></app-add-user-modal>
</div>
