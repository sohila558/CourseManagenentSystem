<app-nav-bar></app-nav-bar>
<div class="container py-5">
  <h2 class="fw-bold mb-4">My Enrolled Courses</h2>

  <div *ngIf="(myEnrollments$ | async)?.length === 0" class="text-center py-5">
    <div class="mb-3">
      <i class="bi bi-journal-x display-1 text-muted"></i>
    </div>
    <h4 class="text-muted">You haven't enrolled in any courses yet.</h4>
    <a routerLink="/student" class="btn btn-primary mt-3 px-4 rounded-pill">Explore Courses</a>
  </div>

  <div class="row g-4">
    <div class="col-md-4" *ngFor="let item of myEnrollments$ | async">
      <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
        <img [src]="item.courseImage" class="card-img-top" style="height: 200px; object-fit: cover;">
        <div class="card-body p-4">
          <span class="badge bg-success-subtle text-success mb-2">Active</span>
          <h5 class="card-title fw-bold mb-3">{{ item.courseTitle }}</h5>
          <p class="small text-muted mb-4">
            <i class="bi bi-person me-1"></i> {{ item.instructorName }}
          </p>
          <div class="d-grid">
            <a [routerLink]="['/student/course', item.courseId]" class="btn btn-outline-primary rounded-pill fw-bold">
              Continue Learning
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
