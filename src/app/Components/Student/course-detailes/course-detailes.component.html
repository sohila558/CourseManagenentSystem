<app-nav-bar></app-nav-bar>
<div class="container py-5" *ngIf="course$ | async as course">
  <div class="row g-5">
    <div class="col-lg-8">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a routerLink="/student" class="text-decoration-none">Courses</a></li>
          <li class="breadcrumb-item active">{{ course.category }}</li>
        </ol>
      </nav>

      <h1 class="fw-bold display-4 mb-3">{{ course.title }}</h1>
      <div class="d-flex align-items-center mb-4">
        <img src="https://ui-avatars.com/api/?name={{course.instructorName}}" class="rounded-circle me-2" width="40">
        <span class="text-muted">Instructed by <strong class="text-dark">{{ course.instructorName }}</strong></span>
      </div>

      <img [src]="course.image" class="img-fluid rounded-4 shadow-sm mb-5" 
           style="width: 100%; max-height: 400px; object-fit: cover;"
           onerror="this.src='https://placehold.co/800x400?text=Course+Cover'">

      <h3 class="fw-bold mb-3">About this course</h3>
      <p class="text-muted lh-lg fs-5">{{ course.description }}</p>
    </div>

    <div class="col-lg-4">
      <div class="card border-0 shadow-lg rounded-4 sticky-top" style="top: 2rem;">
        <div class="card-body p-4">
          <div class="mb-4">
            <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2 mb-3">Professional Certificate</span>
            <h4 class="fw-bold">Free for Students</h4>
          </div>
          
          <div class="d-grid gap-2">
            <button *ngIf="!(isEnrolled$ | async)" (click)="enroll()" class="btn btn-primary btn-lg rounded-pill fw-bold py-3">
              Enroll Now
            </button>
            <button *ngIf="isEnrolled$ | async" (click)="cancelEnrollment()" class="btn btn-danger btn-lg rounded-pill fw-bold py-3">
              Cancel Enrollment
            </button>
            
            <button (click)="toggleWishlist()" class="btn btn-lg rounded-pill fw-bold py-3"
                    [ngClass]="(isInWishlist$ | async) ? 'btn-success' : 'btn-outline-dark'">
              <i class="bi" [ngClass]="(isInWishlist$ | async) ? 'bi-heart-fill' : 'bi-heart'"></i>
              {{ (isInWishlist$ | async) ? 'In Wishlist' : 'Add to Wishlist' }}
            </button>
          </div>

          <hr class="my-4">
          <div class="small text-secondary">
            <div class="mb-2"><i class="bi bi-clock me-2 text-primary"></i> 12 Weeks Duration</div>
            <div class="mb-2"><i class="bi bi-bar-chart me-2 text-primary"></i> Beginner Level</div>
            <div><i class="bi bi-translate me-2 text-primary"></i> Subtitles: English, Arabic</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="!(course$ | async)" class="container py-5 text-center">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="mt-3 text-muted">Fetching course details...</p>
</div>
