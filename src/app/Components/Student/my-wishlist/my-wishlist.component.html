<app-nav-bar></app-nav-bar>
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold m-0"><i class="bi bi-heart-fill text-danger me-2"></i>My Wishlist</h2>
    <span class="badge bg-dark rounded-pill px-3" *ngIf="(wishlistItems$ | async) as items">
      {{ items.length }} Items
    </span>
  </div>

  <div *ngIf="(wishlistItems$ | async)?.length === 0" class="text-center py-5 shadow-sm rounded-4 bg-light">
    <i class="bi bi-heartbreak display-1 text-muted"></i>
    <h4 class="mt-3 text-secondary">Your wishlist is empty</h4>
    <p class="text-muted">Save courses you're interested in for later!</p>
    <a routerLink="/student" class="btn btn-primary px-4 rounded-pill mt-2">Browse Courses</a>
  </div>

  <div class="row g-4">
    <div class="col-md-6 col-lg-4" *ngFor="let item of wishlistItems$ | async">
      <div class="card h-100 border-0 shadow-sm rounded-4 position-relative">
        <button (click)="remove(item.id)" 
                class="btn btn-light btn-sm position-absolute top-0 end-0 m-3 rounded-circle shadow-sm">
          <i class="bi bi-trash text-danger"></i>
        </button>

        <img [src]="item.courseImage" class="card-img-top rounded-top-4" style="height: 180px; object-fit: cover;">
        
        <div class="card-body p-4">
          <h5 class="card-title fw-bold mb-3">{{ item.courseTitle }}</h5>
          <div class="d-flex justify-content-between align-items-center">
            <a [routerLink]="['/student/course', item.courseId]" class="btn btn-primary rounded-pill px-4">
              View Details
            </a>
            <span class="small text-muted">Added: {{ item.addedDate | date:'MMM d' }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
